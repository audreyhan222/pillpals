name: pillpal
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  firebase_core: ^3.0.0
  flutter:
    sdk: flutter
  go_router: ^12.1.3
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.5
  win32: ^5.5.4
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pals/cat/
    - assets/pals/penguin/
    - assets/pals/bunny/
